<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Runner | Professional Native JS Engine</title>
    <meta name="description" content="A professional-grade side-scrolling arcade game built with native JavaScript and Vite.">
    <!-- Google Fonts for typography -->
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/style.css">
</head>
<body>
    <div id="game-container">
        <!-- Canvas where the game is rendered -->
        <canvas id="gameCanvas"></canvas>

        <!-- UI Overlay: Start Screen -->
        <div id="menu-overlay" class="overlay">
            <h1 class="neon-text">NEON RUNNER</h1>
            <p class="subtitle">PRO EDITION | VITIFIED</p>
            <div class="controls-hint">
                <span>[SPACE] or [UP] to JUMP</span>
            </div>
            <button id="start-btn" class="neon-btn">START CORE</button>
        </div>

        <!-- UI Overlay: Game Over -->
        <div id="gameover-overlay" class="overlay hidden">
            <h2 class="neon-text-red">SYSTEM CRASH</h2>
            <p id="final-score">SCORE: 0</p>
            <button id="restart-btn" class="neon-btn">REBOOT</button>
        </div>

        <div id="hud" class="hidden">
            <div class="score-data">
                <div class="score-container">
                    <span class="label">DATA PKTS:</span>
                    <span id="score-val">0</span>
                </div>
                <div class="score-container">
                    <span class="label">BEST:</span>
                    <span id="best-val">0</span>
                </div>
            </div>
            <!-- Game Controllers -->
            <div class="controls-group">
                <button id="pause-btn" class="icon-btn" title="Pause/Resume (ESC)">
                    <span id="pause-icon">⏸</span>
                </button>
                <button id="mute-btn" class="icon-btn" title="Mute/Unmute">
                    <span id="mute-icon">🔊</span>
                </button>
                <button id="home-btn" class="icon-btn" title="Quit to Menu">
                    <span id="home-icon">🏠</span>
                </button>
            </div>
        </div>

        <!-- System Idle Overlay (Pause) -->
        <div id="pause-overlay" class="overlay hidden">
            <h2 class="neon-text-blue">SYSTEM IDLE</h2>
            <p class="subtitle">PAUSED | [ESC] to RESUME</p>
            <button id="resume-btn" class="neon-btn">RESUME CORE</button>
        </div>
    </div>

    <!-- Entry point using ES Modules -->
    <script type="module" src="/src/main.js"></script>
</body>
</html>
